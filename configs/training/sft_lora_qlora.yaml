# Starter training config placeholder.
# Replace these values once the first domain task and model are chosen.

experiment_name: "starter-sft"
base_model: "replace-with-open-model"
dataset_path: "data/sample/domain_assistant_examples.jsonl"
output_dir: "models/starter-sft"
method: "sft"

training:
  num_epochs: 1
  learning_rate: 2.0e-5
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4

peft:
  enabled: true
  strategy: "lora"
  rank: 16
  alpha: 32
  dropout: 0.05

quantization:
  enabled: false
  strategy: "4bit"
