experiment_name: "domain-assistant-sft"
method: "sft"
base_model: "sshleifer/tiny-gpt2"
output_dir: "models/domain-assistant-sft"

dataset:
  train_path: "data/sample/domain_assistant_train.jsonl"
  validation_path: "data/sample/domain_assistant_validation.jsonl"
  max_length: 256
  mask_prompt_tokens: true

training:
  num_train_epochs: 1
  learning_rate: 2.0e-4
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 1
  warmup_steps: 0
  weight_decay: 0.0
  logging_steps: 5
  save_steps: 20
  eval_steps: 20
  seed: 42

lora:
  enabled: false
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - "c_attn"
    - "c_proj"

quantization:
  enabled: false
  load_in_4bit: false
  compute_dtype: "float16"
